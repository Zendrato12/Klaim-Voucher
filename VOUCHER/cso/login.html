<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Petugas — Klaim Voucher ISG</title>
<link rel="icon" href="../images/logo-isg.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/theme.css">
<style>
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,var(--isg-red) 0%, var(--isg-red-dark) 60%, #7a0116 100%);
    padding:20px;
  }
  .login-wrap{max-width:400px;width:100%;}
  .login-logo{text-align:center;margin-bottom:22px;}
  .login-logo img{width:64px;margin:0 auto 10px;border-radius:14px;background:#fff;padding:6px;}
  .login-logo h1{color:#fff;font-size:19px;margin:0 0 4px;font-weight:700;}
  .login-logo p{color:rgba(255,255,255,0.85);font-size:13px;margin:0;}
  .login-card{background:#fff;border-radius:20px;padding:32px 28px;box-shadow:0 20px 50px rgba(0,0,0,0.3);}
  .role-tabs{display:flex;gap:8px;margin-bottom:20px;background:var(--isg-gray-100);border-radius:10px;padding:4px;}
  .role-tabs button{flex:1;padding:9px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:600;color:var(--isg-gray-600);}
  .role-tabs button.active{background:#fff;color:var(--isg-red);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .demo-hint{background:#FFF9E8;border:1px solid var(--isg-yellow);border-radius:10px;padding:10px 12px;font-size:12px;color:#8a5a00;margin-top:16px;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <img src="../images/logo-isg.png" alt="ISG">
    <h1>Klaim Voucher ISG</h1>
    <p>Portal Petugas CSO / Kasir</p>
  </div>
  <div class="login-card">
    <form id="login-form">
      <div class="field">
        <label>Username</label>
        <input type="text" id="f-username" placeholder="Masukkan username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="f-password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i> Masuk
      </button>
      <div id="login-msg" style="margin-top:12px;font-size:13px;text-align:center;color:var(--isg-danger);"></div>
    </form>
    <div class="demo-hint">
      <b>Demo Akun:</b> username <code>kasir1</code> / password <code>kasir123</code> (role Kasir), atau <code>cso1</code> / <code>cso123</code> (role CSO).
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  // Redirect if already logged in
  const sess = ISG_AUTH.getSession();
  if (sess && (sess.role === 'cso' || sess.role === 'kasir')) window.location.href = 'index.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const msg = document.getElementById('login-msg');
    msg.textContent = '';
    const username = document.getElementById('f-username').value.trim();
    const password = document.getElementById('f-password').value;
    btn.disabled = true; btn.innerHTML = '<div class="isg-spinner"></div> Memproses...';
    try {
      const sess = await ISG_AUTH.login(username, password);
      if (sess.role !== 'cso' && sess.role !== 'kasir') {
        ISG_AUTH.clearSession();
        throw new Error('Akun ini bukan akun CSO/Kasir. Gunakan portal Admin.');
      }
      isgToast('Login berhasil, selamat bertugas ' + sess.full_name, 'success');
      setTimeout(() => window.location.href = 'index.html', 600);
    } catch (err) {
      msg.textContent = err.message || 'Login gagal';
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk';
    }
  });
</script>
</body>
</html>
