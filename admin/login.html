<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin — ISG Voucher System</title>
<link rel="icon" href="../images/logo-isg.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/theme.css">
<style>
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 20% 20%, #ffe9a8 0%, transparent 40%), linear-gradient(160deg,#1a1a1a 0%, #3a0510 55%, var(--isg-red-dark) 100%);
    padding:20px;
  }
  .login-wrap{max-width:420px;width:100%;}
  .login-logo{text-align:center;margin-bottom:22px;}
  .login-logo img{width:64px;margin:0 auto 10px;border-radius:14px;background:#fff;padding:6px;}
  .login-logo h1{color:#fff;font-size:20px;margin:0 0 4px;font-weight:700;}
  .login-logo p{color:var(--isg-yellow);font-size:13px;margin:0;font-weight:600;letter-spacing:.5px;}
  .login-card{background:#fff;border-radius:20px;padding:34px 30px;box-shadow:0 25px 60px rgba(0,0,0,0.4);}
  .demo-hint{background:#FFF9E8;border:1px solid var(--isg-yellow);border-radius:10px;padding:10px 12px;font-size:12px;color:#8a5a00;margin-top:16px;}
  .back-link{display:block;text-align:center;margin-top:18px;color:rgba(255,255,255,0.75);font-size:13px;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <img src="../images/logo-isg.png" alt="ISG">
    <h1>ISG Voucher System</h1>
    <p><i class="fa-solid fa-shield-halved"></i> DASHBOARD ADMINISTRATOR</p>
  </div>
  <div class="login-card">
    <form id="login-form">
      <div class="field">
        <label>Username</label>
        <input type="text" id="f-username" placeholder="Masukkan username admin" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="f-password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard
      </button>
      <div id="login-msg" style="margin-top:12px;font-size:13px;text-align:center;color:var(--isg-danger);"></div>
    </form>
    <div class="demo-hint"><b>Demo Akun:</b> username <code>admin</code> / password <code>admin123</code></div>
  </div>
  <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Kembali ke Portal Utama</a>
</div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  const sess = ISG_AUTH.getSession();
  if (sess && sess.role === 'admin') window.location.href = 'index.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const msg = document.getElementById('login-msg');
    msg.textContent = '';
    const username = document.getElementById('f-username').value.trim();
    const password = document.getElementById('f-password').value;
    btn.disabled = true; btn.innerHTML = '<div class="isg-spinner"></div> Memproses...';
    try {
      const sess = await ISG_AUTH.login(username, password);
      if (sess.role !== 'admin') { ISG_AUTH.clearSession(); throw new Error('Akun ini bukan akun Administrator.'); }
      isgToast('Login berhasil, selamat datang ' + sess.full_name, 'success');
      setTimeout(() => window.location.href = 'index.html', 600);
    } catch (err) {
      msg.textContent = err.message || 'Login gagal';
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard';
    }
  });
</script>
</body>
</html>
